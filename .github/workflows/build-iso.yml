name: Build AiOS ISO

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Native Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            debootstrap \
            squashfs-tools \
            xorriso \
            grub-pc-bin \
            grub-efi-amd64-bin \
            mtools \
            bubblewrap

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Modular Magic CLI
        run: |
          # Nutzt das direkte, offizielle Installationsskript (keine HTML-Weiterleitung)
          curl -ssL https://dl.modular.com/bsh/magic/latest/install.sh | bash
          
          # Registriert die neu erstellten Pfade im GitHub Runner Umgebungsprofil
          echo "$HOME/.modular/bin" >> $GITHUB_PATH
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Prepare Workspace and Bypass Large Model Download
        run: |
          sudo mkdir -p /build
          sudo cp -r ./* /build/
          
          # Erstellt das Dummy-Modell für einen reibungslosen CI-Durchlauf
          sudo mkdir -p /build/rootfs/opt/aios/models/
          echo "DUMMY_LLM_WEIGHTS_FOR_CI_BUILD" | sudo tee /build/rootfs/opt/aios/models/qwen2.5-7b-instruct-q4_k_m.gguf > /dev/null
          
          # Deaktiviert den großen Download im Skript
          sudo sed -i 's|/bin/bash /build/scripts/download_model.sh|# Bypass download|g' /build/build.sh

      - name: Execute AiOS Native Build Pipeline
        run: |
          cd /build
          sudo chmod +x build.sh
          sudo ./build.sh
          cp /build/aios.iso ${{ github.workspace }}/aios.iso

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aios-iso-image
          path: aios.iso
          if-no-files-found: error