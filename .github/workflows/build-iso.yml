name: Build AI_OS ISO

on:
  push:
    branches: [ "main" ]  # Löst den Build aus, sobald Sie Code hochladen
  workflow_dispatch:     # Ermöglicht es, den Build manuell im Web zu starten

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Live-Build Tools installieren
        run: |
          sudo apt-get update
          sudo apt-get install -y live-build xorriso squashfs-tools

      - name: ISO Struktur aufbauen
        run: |
          # Erstellt ein minimales Debian-Live-System
          mkdir live-build-env && cd live-build-env
          lb config --binary-images iso-hybrid
          
          # Hier kopieren Sie Ihr AI_OS Projekt in das spätere System (chroot)
          mkdir -p config/includes.chroot/opt/ai_os
          cp -r ../* config/includes.chroot/opt/ai_os/ || true

      - name: ISO kompilieren
        run: |
          cd live-build-env
          sudo lb build

      - name: ISO als Download bereitstellen
        uses: actions/upload-artifact@v4
        with:
          name: AI_OS-Live-Image
          path: live-build-env/*.iso
