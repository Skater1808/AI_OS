name: Build AI_OS ISO

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Build-Werkzeuge installieren
        run: |
          sudo apt-get update
          sudo apt-get install -y live-build xorriso squashfs-tools rsync

      - name: ISO Struktur aufbauen
        run: |
          # Erstellt den Build-Ordner im Home-Verzeichnis des Runners
          mkdir -p /home/runner/live-build-env
          cd /home/runner/live-build-env
          
          # Initialisiert die Konfiguration
          lb config --binary-images iso-hybrid
          
          # Erstellt den Zielordner im zukünftigen Linux-System
          mkdir -p config/includes.chroot/opt/ai_os
          
          # Kopiert Ihr AI_OS Projekt über den exakten GitHub-Pfad
          rsync -av --exclude='.git' --exclude='.github' "$GITHUB_WORKSPACE/" config/includes.chroot/opt/ai_os/

      - name: ISO kompilieren
        run: |
          cd /home/runner/live-build-env
          sudo lb build

      - name: ISO als Download bereitstellen
        uses: actions/upload-artifact@v4
        with:
          name: AI_OS-Live-Image
          path: /home/runner/live-build-env/*.iso
