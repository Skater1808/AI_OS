name: Build AiOS Distribution

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-os:
    runs-on: ubuntu-latest

    steps:
    # 1. Repository-Code auschecken
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # 2. Verzeichnisstruktur vorbereiten
    # Falls dein Repo die Ordner "core-daemon", "ai-engine" etc. direkt im Root hat,
    # verschieben wir sie hier nach /build, damit das Shell-Skript die Pfade findet.
    - name: Prepare Build Workspace
      run: |
        sudo mkdir -p /build
        sudo chown -R runner:docker /build
        cp -r * /build/

    # 3. Offizielle Rust-Toolchain installieren
    - name: Install Rust Toolchain
      uses: dtolnay/rust-toolchain@stable

    # 4. Rust System Daemon auf dem Host kompilieren (behebt Exit Code 127)
    - name: Build Rust Daemon on Host
      run: |
        cd /build/core-daemon
        cargo build --release

    # 5. OS-Build-Skript mit Root-Rechten ausführen (behebt Python-Deadlock)
    - name: Run OS Build Script (Debootstrap & ISO Generation)
      run: |
        cd /build
        sudo chmod +x build.sh
        sudo ./build.sh

    # 6. Das fertige ISO-Bootmedium als GitHub-Artefakt bereitstellen
    - name: Upload AiOS ISO Artifact
      uses: actions/upload-artifact@v4
      with:
        name: aios-distribution-iso
        path: /build/aios.iso
        if-no-files-found: error
        retention-days: 5