name: Build AiOS Distribution

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-os:
    runs-on: ubuntu-latest

    steps:
    # 1. Repository-Code auschecken
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # 2. Host-System-Abhängigkeiten installieren (Komplettes ISO- & Boot-Tooling)
    - name: Install Host Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y debootstrap squashfs-tools xorriso grub-pc-bin grub-common mtools libisoburn1 grub-efi-amd64-bin

    # 3. Verzeichnisstruktur vorbereiten
    - name: Prepare Build Workspace
      run: |
        sudo mkdir -p /build
        sudo chown -R runner:docker /build
        cp -r * /build/

    # 4. Offizielle Rust-Toolchain installieren
    - name: Install Rust Toolchain
      uses: dtolnay/rust-toolchain@stable

    # 5. Rust System Daemon auf dem Host kompilieren
    - name: Build Rust Daemon on Host
      run: |
        cd /build/core-daemon
        cargo build --release

    # 6. OS-Build-Skript mit Root-Rechten ausführen
    - name: Run OS Build Script (Debootstrap & ISO Generation)
      run: |
        cd /build
        sudo chmod +x build.sh
        sudo ./build.sh

    # 7. Das fertige ISO-Bootmedium als GitHub-Artefakt bereitstellen
    - name: Upload AiOS ISO Artifact
      uses: actions/upload-artifact@v4
      with:
        name: aios-distribution-iso
        path: /build/aios.iso
        if-no-files-found: error
        retention-days: 5