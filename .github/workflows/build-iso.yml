name: Build AiOS ISO

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Native Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            debootstrap \
            squashfs-tools \
            xorriso \
            grub-pc-bin \
            grub-efi-amd64-bin \
            mtools \
            bubblewrap

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Modular CLI & Mojo
        run: |
          curl -ssL https://magic.modular.com | sh
          # Wir fügen den Pfad temporär hinzu, falls Cargo/Magic ihn im Runner sucht
          echo "$HOME/.modular/bin" >> $GITHUB_PATH
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Execute AiOS Native Build Pipeline
        run: |
          # Wir simulieren die Pfade, die build.sh erwartet
          sudo mkdir -p /build
          sudo cp -r ./* /build/
          cd /build
          
          # Skript ausführbar machen und mit echten Root-Rechten starten
          sudo chmod +x build.sh
          sudo ./build.sh
          
          # Die fertige ISO zurück in den GitHub-Workspace kopieren
          cp /build/aios.iso ${{ github.workspace }}/aios.iso

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aios-iso-image
          path: aios.iso
          if-no-files-found: error