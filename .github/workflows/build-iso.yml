name: Build AI_OS ISO

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Build-Werkzeuge installieren
        run: |
          sudo apt-get update
          sudo apt-get install -y live-build xorriso squashfs-tools rsync

      - name: ISO Struktur aufbauen
        run: |
          # Erstellt das Arbeitsverzeichnis für live-build außerhalb des Repository-Ordners
          cd ..
          mkdir live-build-env && cd live-build-env
          
          # Initialisiert die Standard-Konfiguration für Debian
          lb config --binary-images iso-hybrid
          
          # Erstellt den Zielordner im zukünftigen Linux-System
          mkdir -p config/includes.chroot/opt/ai_os
          
          # Kopiert Ihr AI_OS Projekt sicher ohne Endlosschleife
          rsync -av --exclude='live-build-env' ../github-workspace/ config/includes.chroot/opt/ai_os/

      - name: ISO kompilieren
        run: |
          cd ../live-build-env
          sudo lb build

      - name: ISO als Download bereitstellen
        uses: actions/upload-artifact@v4
        with:
          name: AI_OS-Live-Image
          path: ../live-build-env/*.iso
