name: Build AI_OS ISO

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Build-Werkzeuge und Debian-Schlüssel installieren
        run: |
          sudo apt-get update
          sudo apt-get install -y live-build xorriso squashfs-tools rsync debootstrap debian-archive-keyring

      - name: ISO Struktur aufbauen
        run: |
          mkdir -p /home/runner/live-build-env
          cd /home/runner/live-build-env
          
          # Radikaler Reset: Löscht alte, fehlerhafte Konfigurationsbäume komplett
          sudo lb clean --all
          rm -rf config .build
          
          # Absolut sichere Konfiguration mit den exakten Debian-Endpunkten
          lb config \
            --mode debian \
            --distribution bookworm \
            --architecture amd64 \
            --binary-images iso-hybrid \
            --debian-installer false \
            --mirror-bootstrap "http://debian.org" \
            --mirror-chroot "http://debian.org" \
            --mirror-binary "http://debian.org" \
            --keyring "/usr/share/keyrings/debian-archive-keyring.gpg"
          
          # Erstellt die Zielordner frisch
          mkdir -p config/includes.chroot/opt/ai_os
          mkdir -p config/includes.chroot/etc/systemd/system/multi-user.target.wants
          mkdir -p config/includes.chroot/lib/systemd/system
          
          # Kopiert Ihr KI-Projekt in das System
          rsync -av --exclude='.git' --exclude='.github' "$GITHUB_WORKSPACE/" config/includes.chroot/opt/ai_os/
          
          # Platziert Ihren aios-core.service im Image
          if [ -f "$GITHUB_WORKSPACE/config/aios-core.service" ]; then
            cp "$GITHUB_WORKSPACE/config/aios-core.service" config/includes.chroot/lib/systemd/system/
            ln -sf /lib/systemd/system/aios-core.service config/includes.chroot/etc/systemd/system/multi-user.target.wants/aios-core.service
          fi

      - name: ISO kompilieren
        run: |
          cd /home/runner/live-build-env
          sudo lb build

      - name: ISO als Download bereitstellen
        uses: actions/upload-artifact@v4
        with:
          name: AI_OS-Live-Image
          path: /home/runner/live-build-env/*.iso
